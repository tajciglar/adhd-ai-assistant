      value: "Meerkat"
    - type: not-contains
      value: "Stallion"
    - type: not-contains
      value: "Hedgehog"
    - type: not-contains
      value: "Red Panda"
    - type: not-contains
      value: "Penguin"
    - type: not-contains
      value: "Octopus"
    - type: not-contains
      value: "Swan"
    - type: not-contains
      value: "Bunny"
    - type: not-contains
      value: "Engine Speed"
    - type: not-contains
      value: "Time Horizon"
    - type: not-contains
      value: "Social Radar"
    - type: not-contains
      value: "Emotional Thermostat"
    - type: not-contains
      value: "Sensory Filter"
    - type: not-contains
      value: "[Source"
    - type: not-contains
      value: "according to our resources"
    # ── Quality rails (new rules) ─────────────────────────────────────────────
    - type: not-icontains
      value: "that sounds exhausting"
    - type: not-icontains
      value: "it's so hard when"
    - type: not-icontains
      value: "so many parents"
    - type: not-icontains
