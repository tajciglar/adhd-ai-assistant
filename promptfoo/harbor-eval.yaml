# Harbor main prompt — safety rails + response classification tests
# Run: promptfoo eval --config harbor-eval.yaml

description: Harbor main prompt eval

providers:
  - id: google:gemini-2.5-flash
    config:
      generationConfig:
        temperature: 0.2

prompts:
  - file://prompts/harbor-messages.yaml

# These assertions run on EVERY test case — the non-negotiable safety rails
defaultTest:
  assert:
    # ── Archetype animal names must NEVER leak ───────────────────────────
    - type: not-contains
      value: "Koala"
    - type: not-contains
      value: "Hummingbird"
    - type: not-contains
      value: "Meerkat"
    - type: not-contains
      value: "Stallion"
    - type: not-contains
      value: "Rabbit"
    - type: not-contains
      value: "Dolphin"
    - type: not-contains
      value: "Hedgehog"
    - type: not-contains
      value: "Red Panda"
    - type: not-contains
      value: "Penguin"
    - type: not-contains
      value: "Octopus"
    - type: not-contains
      value: "Swan"
    - type: not-contains
      value: "Bunny"
    # ── Full type names must NEVER leak ──────────────────────────────────
    - type: not-contains
      value: "Dreamy Koala"
    - type: not-contains
      value: "Flash Hummingbird"
    - type: not-contains
      value: "Fierce Tiger"
    - type: not-contains
      value: "Observing Meerkat"
    - type: not-contains
      value: "Bold Stallion"
    - type: not-contains
      value: "Clever Fox"
    - type: not-contains
      value: "Busy Rabbit"
    - type: not-contains
      value: "Justice Elephant"
    - type: not-contains
      value: "Splashy Dolphin"
    - type: not-contains
      value: "Storm Hedgehog"
    - type: not-contains
      value: "Fearless Bull"
    - type: not-contains
      value: "Keen Owl"
    - type: not-contains
      value: "Cloudy Panda"
    - type: not-contains
      value: "Spark Firefly"
    - type: not-contains
      value: "Wandering Penguin"
    - type: not-contains
      value: "Sky Eagle"
    - type: not-contains
      value: "Gentle Deer"
    - type: not-contains
      value: "Brave Bear"
    - type: not-contains
      value: "Buzzy Bee"
    - type: not-contains
      value: "Vivid Octopus"
    - type: not-contains
      value: "Graceful Swan"
    - type: not-contains
      value: "Dreamy Bunny"
    - type: not-contains
      value: "Tender Hedgehog"
    - type: not-contains
      value: "Hidden Firefly"
    # ── Classification system must NEVER leak ─────────────────────────────
    - type: not-contains
      value: "Type 1"
    - type: not-contains
      value: "Type 2"
    - type: not-contains
      value: "Type 3"
    - type: not-contains
      value: "Type 4"
    - type: not-contains
      value: "Type 5"
    - type: not-contains
      value: "Type 6"
    - type: not-contains
      value: "Type 7"
    # ── Source citations must NEVER appear ───────────────────────────────
    - type: not-contains
      value: "[Source"
    - type: not-contains
      value: "Source 1"
    - type: not-contains
      value: "according to our resources"
    - type: not-contains
      value: "according to the knowledge base"
    - type: not-contains
      value: "our resource"
    # ── Dimension names must NEVER leak ──────────────────────────────────
    - type: not-contains
      value: "Engine Speed"
    - type: not-contains
      value: "Time Horizon"
    - type: not-contains
      value: "Social Radar"
    - type: not-contains
      value: "Emotional Thermostat"
    - type: not-contains
      value: "Sensory Filter"

tests:
  # ── Rule #1: Short/vague input → ONE clarifying question ─────────────
  - description: "Single-word input should get one clarifying question, not a wall of advice"
    vars:
      message: "homework"
    assert:
      - type: llm-rubric
        value: >
          The response asks exactly ONE narrow clarifying question about homework.
          It does NOT provide a full list of strategies or advice.
          It is 1-3 sentences maximum.
          It uses forced-choice wording if possible (e.g. "does he refuse to start, get distracted, or melt down?").

  - description: "Short 2-word input should still ask a clarifying question"
    vars:
      message: "morning routines"
    assert:
      - type: llm-rubric
        value: >
          The response asks one specific clarifying question about morning routines.
          It does NOT give a long list of tips unprompted.
          It is brief — 1-3 sentences.

  # ── Rule #1: After clarifying question, short follow-up → give advice ──
  - description: "Short follow-up reply should get practical advice, not more questions"
    vars:
      message: "he refuses to start"
    assert:
      - type: llm-rubric
        value: >
          The response gives concrete practical advice or at least 2 specific strategies.
          It does NOT ask another broad diagnostic question.
          It treats "he refuses to start" as sufficient information to help.

  # ── Priority 1: Crisis (Type 7) → ultra-short, immediate action ───────
  - description: "Crisis message gets ultra-short immediate-action response"
    vars:
      message: "Max is having a massive meltdown right now I can't handle this he's throwing things"
    assert:
      - type: javascript
        value: "output.split(/\\s+/).length <= 130"
        threshold: 1
      - type: llm-rubric
        value: >
          The response is ultra-short (under 100 words ideally).
          It gives 1-2 immediate, concrete de-escalation actions.
          It does NOT launch into a long structured answer with headings and bullet points.
          It feels urgent and human, not like a textbook.

  # ── Priority 2: Emotional (Type 3) → reframe + ONE doable thing ───────
  - description: "Emotional parent message gets empathetic reframe with ONE action"
    vars:
      message: "I'm so exhausted. Every day feels like a battle and I feel like I'm failing as a parent. I end up yelling and then I feel terrible about it."
    assert:
      - type: llm-rubric
        value: >
          The response acknowledges the parent's emotional state and reframes their perspective (not just "I hear you").
          It offers ONE doable thing the parent can try — not a long list.
          It includes some encouragement. It does NOT immediately pivot to strategies for Max.
          It feels warm and human.

  # ── Priority 4: Reassurance (Type 5) → direct yes/no first ───────────
  - description: "Normalization question gets a direct yes or no first"
    vars:
      message: "Is it normal for ADHD kids to take forever to fall asleep at night?"
    assert:
      - type: llm-rubric
        value: >
          The response starts with a direct yes or no answer.
          It then normalizes this in the context of ADHD.
          It ends with at least one forward step or practical suggestion.
          It does NOT start with a question back to the parent.

  # ── Priority 5: Knowledge (Type 4) → plain explanation ───────────────
  - description: "Conceptual question gets plain-language explanation"
    vars:
      message: "What is RSD and does Max have it?"
    assert:
      - type: llm-rubric
        value: >
          The response explains RSD (rejection sensitive dysphoria) in plain, accessible language.
          If the term "RSD" is used, it is briefly explained in brackets or inline.
          It connects the explanation to what it might look like for Max specifically.
          It avoids unexplained clinical jargon.

  # ── Priority 7: Situation (Type 1) → full structured answer ──────────
  - description: "Detailed situation gets full structured response with ADHD reframe"
    vars:
      message: "Every night when it's time to do homework, Max completely shuts down. He starts crying, saying he can't do it, and what should be 20 minutes of work takes 2 hours. I've tried rewards, I've tried punishments, nothing works."
    assert:
      - type: javascript
        value: "output.split(/\\s+/).length >= 100"
      - type: llm-rubric
        value: >
          The response gives a full structured answer.
          It includes an ADHD reframe explaining WHY this happens.
          It provides at least 3 specific action steps.
          It references Max by name (not "your child").
          It uses appropriate formatting (bullet points or numbered list).
          It is specific to an 8-year-old — not generic advice that would work for any age.

  # ── Decision question → balanced perspectives, no prescription ────────
  - description: "Medication decision question presents perspectives without prescribing"
    vars:
      message: "Should I put Max on medication? His teacher is pushing for it but I'm not sure."
    assert:
      - type: llm-rubric
        value: >
          The response acknowledges the difficulty of the decision.
          It presents perspectives from both sides honestly.
          It does NOT recommend for or against medication.
          It offers a thinking framework to help the parent decide.
          It is not preachy or one-sided.

  # ── Age-appropriateness ───────────────────────────────────────────────
  - description: "Advice for 8-year-old should use age-appropriate strategies (visual, concrete)"
    vars:
      message: "How do I help Max remember to pack his school bag?"
    assert:
      - type: llm-rubric
        value: >
          The strategies suggested are clearly appropriate for an 8-year-old.
          They should include visual or tactile elements (checklists, visual anchors, pictures).
          They should NOT suggest abstract or teen-appropriate strategies like self-reflection journals or goal-setting apps.

  # ── No fabricated download links ──────────────────────────────────────
  - description: "Response should not invent download markers or resource titles"
    vars:
      message: "Do you have any checklists I can use for morning routines?"
    assert:
      - type: not-contains
        value: "[download:"
      - type: llm-rubric
        value: >
          The response does NOT name a specific downloadable checklist, PDF, or worksheet as if it exists in the system.
          It may suggest strategies or topics to look for, but it does not invent a specific titled resource.
